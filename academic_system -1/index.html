<!DOCTYPE html>
<html lang="en" dir="ltr" id="htmlPage">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Advisor Portal | AOU</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap');

        :root {
            --primary: #1e3a8a;
            --secondary: #3b82f6;
            --white: #ffffff;
            --text-main: #1e293b;
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Tajawal', sans-serif;
            min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            background: #f8fafc; overflow: hidden; position: relative;
        }

        .bg-wrapper { position: absolute; width: 100%; height: 100%; z-index: -1; }
        .blob {
            position: absolute; width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.1) 0%, transparent 70%);
            filter: blur(60px); animation: move 20s infinite alternate linear;
        }
        @keyframes move { from { transform: translate(-10%, -10%); } to { transform: translate(15%, 15%); } }

        .lang-switcher { position: absolute; top: 20px; left: 20px; z-index: 100; }
        #langBtn {
            padding: 8px 16px; background: white; border: 1px solid #e2e8f0;
            border-radius: 50px; cursor: pointer; font-weight: 700; color: var(--primary);
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); transition: 0.3s;
        }

        .split-container {
            display: flex; width: 85%; max-width: 820px; height: 500px;
            background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5); border-radius: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.12); overflow: hidden;
            animation: zoomIn 0.6s ease-out;
        }

        .welcome-side {
            flex: 1; background: linear-gradient(160deg, var(--primary) 0%, #1e40af 100%);
            color: var(--white); padding: 40px; display: flex; flex-direction: column;
            justify-content: center; align-items: flex-start;
        }

        .welcome-side img { 
            width: 170px; 
            height: auto; 
            margin-bottom: 20px; 
            filter: brightness(0) invert(1); 
        }

        .welcome-side h1 { font-size: 1.8rem; margin: 5px 0; font-weight: 700; line-height: 1.2; }
        .welcome-side p { 
            font-size: 0.85rem; 
            line-height: 1.6; 
            opacity: 0.85; 
            border-left: 3px solid var(--secondary); 
            padding-left: 15px; 
            margin-top: 20px;
        }
        [dir="rtl"] .welcome-side p { border-left: none; border-right: 3px solid var(--secondary); padding-right: 15px; }

        .form-side { flex: 1.1; padding: 30px 40px; display: flex; flex-direction: column; justify-content: center; }
        .form-side h2 { font-size: 1.5rem; margin-bottom: 25px; color: var(--text-main); text-align: center; }

        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-size: 0.8rem; font-weight: 700; color: #64748b; }

        .input-wrapper { position: relative; }
        .input-wrapper i { position: absolute; top: 50%; transform: translateY(-50%); color: #94a3b8; font-size: 0.9rem; }
        [dir="ltr"] .input-wrapper i { left: 15px; }
        [dir="rtl"] .input-wrapper i { right: 15px; }

        .input-wrapper input {
            width: 100%; border: 2px solid #f1f5f9; border-radius: 12px; padding: 10px;
            box-sizing: border-box; font-family: inherit; background: #f8fafc; transition: 0.3s;
        }
        [dir="ltr"] .input-wrapper input { padding-left: 40px; }
        [dir="rtl"] .input-wrapper input { padding-right: 40px; }

        .forgot-link { display: block; text-align: left; font-size: 0.75rem; color: var(--secondary); text-decoration: none; margin-top: 5px; cursor: pointer; }
        [dir="rtl"] .forgot-link { text-align: right; }

        .login-btn {
            width: 100%; padding: 12px; background: var(--primary); color: white;
            border: none; border-radius: 12px; font-size: 1rem; font-weight: 700;
            cursor: pointer; margin-top: 15px; transition: 0.3s;
        }
        .login-btn:hover { background: var(--secondary); transform: translateY(-1px); }

        .hidden { display: none !important; }
        @keyframes zoomIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

        @media (max-width: 800px) {
            .split-container { flex-direction: column; height: auto; width: 90%; margin: 20px 0; }
            .welcome-side { text-align: center; align-items: center; padding: 30px; }
            .welcome-side p { display: none; }
            .welcome-side img { width: 130px; }
        }
    </style>
</head>
<body>

    <div class="bg-wrapper"><div class="blob"></div></div>

    <div class="lang-switcher">
        <button id="langBtn" onclick="toggleLanguage()">العربية</button>
    </div>

    <div class="split-container">
        <div class="welcome-side">
            <img src="logo.png.png" alt="AOU Logo">
            <h1 id="mainTitle">Smart Academic Advisor</h1>
            <p id="txt-welcome-desc">The most beautiful integrated intelligent system designed to help IT students organize their academic career and calculate GPAs with professional accuracy.</p>
        </div>

        <div class="form-side">
            <div id="loginCard">
                <h2 id="loginTitle">Secure Login</h2>
                <form id="loginForm">
                    <div class="form-group">
                        <label id="userLabel">Student ID</label>
                        <div class="input-wrapper">
                            <i class="fas fa-id-badge"></i>
                            <input type="text" id="student_id" name="student_id" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label id="passLabel">Password</label>
                        <div class="input-wrapper">
                            <i class="fas fa-key"></i>
                            <input type="password" id="password" name="password" required>
                        </div>
                        <a onclick="toggleView('forgot')" class="forgot-link" id="forgotText">Forgot Password?</a>
                    </div>
                    <button type="button" onclick="handleLogin()" class="login-btn" id="loginBtnText">Login</button>
                </form>
                <p style="text-align:center; font-size: 0.8rem; margin-top: 20px;"><span id="txt-no-acc">New here?</span> <a onclick="toggleView('signup')" id="toSignupLink" style="cursor:pointer; color:var(--secondary); font-weight:700;">Activate Now</a></p>
            </div>

            <div id="signupCard" class="hidden">
                <h2 id="signupTitle">Activation</h2>
                <form id="signupForm">
                    <div class="form-group"><label id="nameLabel">Full Name</label><div class="input-wrapper"><i class="fas fa-user"></i><input type="text" name="name" required></div></div>
                    <div class="form-group"><label id="sidLabel">Student ID</label><div class="input-wrapper"><i class="fas fa-fingerprint"></i><input type="text" name="student_id" required></div></div>
                    <div class="form-group"><label id="sPassLabel">Password</label><div class="input-wrapper"><i class="fas fa-lock"></i><input type="password" name="password" required></div></div>
                    <button type="button" onclick="handleSignup()" class="login-btn" id="signupBtnText">Confirm</button>
                </form>
                <p style="text-align:center; font-size: 0.8rem; margin-top: 20px;"><a onclick="toggleView('login')" id="toLoginLink" style="cursor:pointer; color:var(--secondary); font-weight:700;">Back to Login</a></p>
            </div>

            <div id="forgotCard" class="hidden">
                <h2 id="forgotTitle">Reset Password</h2>
                <form id="forgotForm">
                    <div class="form-group">
                        <label id="forgotIdLabel">Student ID</label>
                        <div class="input-wrapper">
                            <i class="fas fa-id-card"></i>
                            <input type="text" name="student_id" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label id="newPassLabel">New Password</label>
                        <div class="input-wrapper">
                            <i class="fas fa-lock-open"></i>
                            <input type="password" name="new_password" required>
                        </div>
                    </div>
                    <button type="button" onclick="handleReset()" class="login-btn" id="resetBtnText">Update Password</button>
                </form>
                <p style="text-align:center; font-size: 0.8rem; margin-top: 20px;"><a onclick="toggleView('login')" class="to-login-reset" style="cursor:pointer; color:var(--secondary); font-weight:700;">Back to Login</a></p>
            </div>
        </div>
    </div>

    <script>
        let currentLang = 'en';
        const translations = {
            ar: {
                title: 'Smart Academic Advisor', 
                desc: 'نظام ذكي متكامل مصمم لمساعدة طلاب تقنية المعلومات في تنظيم مسيرتهم الأكاديمية وحساب المعدلات بدقة احترافية.',
                login: 'تسجيل الدخول', user: 'الرقم الجامعي', pass: 'كلمة المرور', btn: 'دخول النظام',
                noAcc: 'جديد هنا؟', toSignup: 'تفعيل الحساب الآن', signup: 'تفعيل الحساب', name: 'الاسم الكامل', sBtn: 'تأكيد التفعيل', toLogin: 'العودة للدخول',
                btnLang: 'English', err: 'الرقم الجامعي أو كلمة المرور غير صحيحة',
                forgot: 'نسيت كلمة المرور؟', resetTitle: 'استعادة كلمة المرور', resetBtn: 'تحديث كلمة المرور', newPass: 'كلمة المرور الجديدة'
            },
            en: {
                title: 'Smart Academic Advisor', 
                desc: 'An integrated intelligent system designed to help IT students organize their academic career and calculate GPAs with professional accuracy.',
                login: 'Secure Login', user: 'Student ID', pass: 'Password', btn: 'Login',
                noAcc: 'New here?', toSignup: 'Activate Now', signup: 'Activation', name: 'Full Name', sBtn: 'Confirm', toLogin: 'Back to Login',
                btnLang: 'العربية', err: 'Invalid Student ID or Password',
                forgot: 'Forgot Password?', resetTitle: 'Reset Password', resetBtn: 'Update Password', newPass: 'New Password'
            }
        };

        function toggleLanguage() {
            currentLang = currentLang === 'ar' ? 'en' : 'ar';
            document.getElementById('htmlPage').dir = currentLang === 'ar' ? 'rtl' : 'ltr';
            document.getElementById('htmlPage').lang = currentLang;
            const t = translations[currentLang];
            document.getElementById('langBtn').innerText = t.btnLang;
            document.getElementById('mainTitle').innerText = t.title;
            document.getElementById('txt-welcome-desc').innerText = t.desc;
            document.getElementById('loginTitle').innerText = t.login;
            document.getElementById('userLabel').innerText = t.user;
            document.getElementById('passLabel').innerText = t.pass;
            document.getElementById('loginBtnText').innerText = t.btn;
            document.getElementById('txt-no-acc').innerText = t.noAcc;
            document.getElementById('toSignupLink').innerText = t.toSignup;
            document.getElementById('signupTitle').innerText = t.signup;
            document.getElementById('nameLabel').innerText = t.name;
            document.getElementById('sidLabel').innerText = t.user;
            document.getElementById('sPassLabel').innerText = t.pass;
            document.getElementById('signupBtnText').innerText = t.sBtn;
            document.getElementById('toLoginLink').innerText = t.toLogin;
            
            // New Translations
            document.getElementById('forgotText').innerText = t.forgot;
            document.getElementById('forgotTitle').innerText = t.resetTitle;
            document.getElementById('forgotIdLabel').innerText = t.user;
            document.getElementById('newPassLabel').innerText = t.newPass;
            document.getElementById('resetBtnText').innerText = t.resetBtn;
            document.querySelectorAll('.to-login-reset').forEach(el => el.innerText = t.toLogin);
        }

        function toggleView(view) {
            document.getElementById('loginCard').classList.toggle('hidden', view !== 'login');
            document.getElementById('signupCard').classList.toggle('hidden', view !== 'signup');
            document.getElementById('forgotCard').classList.toggle('hidden', view !== 'forgot');
        }

        function handleLogin() {
            const form = document.getElementById('loginForm');
            const formData = new FormData(form);

            fetch('login.php', {
                method: 'POST',
                body: formData
            })
            .then(res => res.text())
            .then(data => {
                const result = data.trim();
                if(result === "new_user") window.location.href = "complete_profile.php";
                else if(result === "old_user") window.location.href = "dashboard.php";
                else alert(translations[currentLang].err);
            })
            .catch(err => console.error("Connection Error:", err));
        }

        function handleSignup() {
            const form = document.getElementById('signupForm');
            const formData = new FormData(form);
            fetch('signup.php', { method: 'POST', body: formData })
            .then(() => {
                alert(currentLang === 'ar' ? "تم التفعيل بنجاح" : "Activated Successfully");
                toggleView('login');
            });
        }

        function handleReset() {
            const form = document.getElementById('forgotForm');
            const formData = new FormData(form);
            fetch('reset_password.php', { method: 'POST', body: formData })
            .then(() => {
                alert(currentLang === 'ar' ? "تم تحديث كلمة المرور" : "Password Updated");
                toggleView('login');
            });
        }
    </script>
</body>
</html>
